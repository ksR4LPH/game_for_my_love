<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Для Зарин ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0608;
  --surface: #180c10;
  --surface2: #22101a;
  --rose: #e8526a;
  --rose-dim: rgba(232,82,106,0.18);
  --rose-glow: rgba(232,82,106,0.35);
  --gold: #d4a84b;
  --gold-dim: rgba(212,168,75,0.15);
  --gold-glow: rgba(212,168,75,0.3);
  --blush: #f2b5c0;
  --cream: #f5ece8;
  --muted: #7a5060;
  --border: rgba(232,82,106,0.2);
  --border-gold: rgba(212,168,75,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  color: var(--cream);
}

/* Subtle petal scatter background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 600px 400px at 20% 0%, rgba(232,82,106,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 400px 600px at 80% 100%, rgba(212,168,75,0.06) 0%, transparent 70%),
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 28% 72%, rgba(255,200,180,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 44% 8%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 58% 88%, rgba(255,200,180,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 74% 32%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 55%, rgba(255,200,180,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 6% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 45%, rgba(255,200,180,0.35) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 92% 12%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 60%, rgba(255,200,180,0.3) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
header {
  margin-top: 0;
  text-align: center;
  position: relative;
  z-index: 1;
  padding: 0 1.5rem;
}

.header-eyebrow {
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--rose);
  opacity: 0.7;
  margin-bottom: 0.5rem;
}

header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 7vw, 2.8rem);
  font-weight: 300;
  color: var(--cream);
  letter-spacing: 0.04em;
  line-height: 1.1;
}

header h1 em {
  font-style: italic;
  color: var(--rose);
}

header p {
  margin-top: 0.5rem;
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 300;
  letter-spacing: 0.06em;
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 100;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.music-btn:hover { border-color: var(--rose); box-shadow: 0 0 12px var(--rose-dim); }
.music-btn.playing { border-color: var(--rose); box-shadow: 0 0 16px var(--rose-glow); }

/* STATS */
.stats {
  display: flex;
  gap: 2rem;
  margin: 1.25rem 0 0.25rem;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
.stats span strong { color: var(--blush); font-weight: 400; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 0.75rem;
  max-width: 400px;
  width: 100%;
  position: relative;
  z-index: 1;
  margin-top: 0.5rem;
}

.card { aspect-ratio: 1; perspective: 900px; cursor: pointer; }

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 14px;
}

.card.flipped .card-inner,
.card.matched .card-inner { transform: rotateY(180deg); }

.card-front, .card-back {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.card-front {
  background: var(--surface);
  border: 1px solid var(--border);
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow: hidden;
}

/* Rose petal pattern on card back */
.card-front::after {
  content: '✿';
  font-size: 1.4rem;
  opacity: 0.08;
  color: var(--rose);
}

.card-back {
  background: linear-gradient(145deg, var(--surface2) 0%, #1a0d14 100%);
  border: 1px solid var(--border);
  transform: rotateY(180deg);
  font-size: clamp(1.7rem, 6.5vw, 2.1rem);
  flex-direction: column;
  gap: 3px;
}

.card.matched .card-back {
  border-color: var(--gold);
  box-shadow: 0 0 18px var(--gold-dim), inset 0 0 14px var(--gold-dim);
  animation: matchPulse 0.5s ease;
}

@keyframes matchPulse {
  0% { transform: rotateY(180deg) scale(1); }
  50% { transform: rotateY(180deg) scale(1.08); }
  100% { transform: rotateY(180deg) scale(1); }
}

.card-back .label {
  font-size: 0.38rem;
  letter-spacing: 0.14em;
  color: var(--gold);
  opacity: 0.65;
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  margin-top: 1px;
}

/* COMPLIMENT MODAL */
.comp-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  background: rgba(5, 2, 4, 0.82);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.comp-modal.show {
  display: flex;
  animation: fadeInModal 0.35s ease;
}

@keyframes fadeInModal {
  from { opacity: 0; }
  to { opacity: 1; }
}

.comp-card {
  background: linear-gradient(160deg, #200f18, #160a12);
  border: 1px solid rgba(232,82,106,0.4);
  border-radius: 20px;
  padding: 2.5rem 2rem 2rem;
  max-width: 340px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 60px var(--rose-dim), 0 0 120px rgba(232,82,106,0.08);
  animation: popUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.comp-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--rose), transparent);
}

@keyframes popUp {
  from { transform: scale(0.72) translateY(10px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.comp-icon {
  font-size: 3rem;
  margin-bottom: 0.9rem;
  display: block;
  animation: floatIcon 2.5s ease-in-out infinite;
}

@keyframes floatIcon {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-7px) rotate(2deg); }
}

.comp-number {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--rose);
  opacity: 0.55;
  margin-bottom: 0.3rem;
}

.comp-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.1rem, 4.5vw, 1.3rem);
  font-weight: 400;
  color: var(--blush);
  letter-spacing: 0.02em;
  margin-bottom: 0.9rem;
  font-style: italic;
}

.comp-text {
  font-size: clamp(0.88rem, 3.5vw, 0.98rem);
  font-weight: 300;
  color: var(--cream);
  line-height: 1.75;
  margin-bottom: 1.75rem;
  opacity: 0.9;
}

.comp-text em {
  color: var(--blush);
  font-style: normal;
  font-weight: 400;
}

.comp-continue {
  background: transparent;
  border: 1px solid rgba(232,82,106,0.45);
  color: var(--rose);
  padding: 0.65rem 2rem;
  border-radius: 100px;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  min-height: 44px;
}

.comp-continue:hover, .comp-continue:active {
  background: rgba(232,82,106,0.1);
  border-color: var(--rose);
}

/* WIN OVERLAY */
.win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,2,4,0.95);
  z-index: 300;
  align-items: flex-start;
  justify-content: center;
  padding: 1.5rem;
  overflow-y: auto;
}

.win-overlay.show {
  display: flex;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.win-box {
  max-width: 380px;
  width: 100%;
  margin: auto;
  padding: 2.5rem 0 2rem;
}

.win-rose {
  font-size: 2.5rem;
  text-align: center;
  margin-bottom: 0.5rem;
  display: block;
  animation: floatIcon 3s ease-in-out infinite;
}

.win-box h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.5rem, 5vw, 1.9rem);
  font-weight: 300;
  color: var(--cream);
  text-align: center;
  margin-bottom: 0.25rem;
  letter-spacing: 0.04em;
}

.win-box h2 em { color: var(--rose); font-style: italic; }

.win-sub {
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}

/* Letter section */
.letter-wrap {
  background: var(--surface);
  border: 1px solid var(--border-gold);
  border-radius: 16px;
  padding: 1.75rem 1.5rem;
  margin-bottom: 1.5rem;
  position: relative;
}

.letter-wrap::before {
  content: '❝';
  font-family: 'Cormorant Garamond', serif;
  font-size: 4rem;
  color: var(--rose);
  opacity: 0.1;
  position: absolute;
  top: -0.5rem;
  left: 1rem;
  line-height: 1;
}

.letter {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  line-height: 2;
  color: var(--cream);
  font-weight: 300;
  white-space: pre-line;
  font-style: italic;
  opacity: 0.9;
}

.letter strong {
  font-style: normal;
  font-weight: 400;
  color: var(--blush);
}

/* Compliment list */
.section-label {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
}

.compliment-list {
  list-style: none;
  margin-bottom: 2rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.compliment-list li {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.9rem 1rem;
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
  transition: border-color 0.2s;
}

.compliment-list li:hover { border-color: rgba(232,82,106,0.35); }

.li-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }

.li-body {}

.li-title {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--rose);
  opacity: 0.8;
  margin-bottom: 0.25rem;
}

.li-text {
  font-size: 0.84rem;
  color: var(--cream);
  font-weight: 300;
  line-height: 1.6;
  opacity: 0.85;
}

.restart-btn {
  display: block;
  width: 100%;
  background: transparent;
  border: 1px solid var(--border-gold);
  color: var(--gold);
  padding: 0.85rem 2rem;
  border-radius: 100px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-style: italic;
  letter-spacing: 0.06em;
  cursor: pointer;
  min-height: 48px;
  transition: background 0.2s;
}

.restart-btn:hover, .restart-btn:active {
  background: var(--gold-dim);
}

footer {
  margin: 0.5rem 0 0;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin: 1.5rem 0 1rem;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-rose { color: var(--rose); font-size: 0.7rem; opacity: 0.5; }
</style>
</head>
<body>

<!-- Music button -->
<button class="music-btn" id="musicBtn" title="Музыка" onclick="toggleMusic()">🎵</button>

<!-- Hidden audio element — поставь music.mp3 рядом с этим файлом -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<header>
  <p class="header-eyebrow">Только для тебя</p>
  <h1>Для <em>Зарин</em></h1>
  <p>Найди все пары — и узнаешь кое-что важное</p>
</header>

<div class="stats">
  <span>Ходов: <strong id="moves">0</strong></span>
  <span>Найдено: <strong id="found">0</strong> / 8</span>
</div>

<div class="grid" id="grid"></div>

<footer>ты особенная ✦</footer>

<!-- COMPLIMENT MODAL -->
<div class="comp-modal" id="compModal">
  <div class="comp-card">
    <span class="comp-icon" id="compIcon">🌹</span>
    <p class="comp-number" id="compNumber"></p>
    <p class="comp-title" id="compTitle"></p>
    <p class="comp-text" id="compText"></p>
    <button class="comp-continue" onclick="closeComp()">Продолжить</button>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <span class="win-rose">🌹</span>
    <h2>Для <em>Зарин</em></h2>
    <p class="win-sub">все пары найдены</p>

    <div class="letter-wrap">
      <div class="letter" id="winLetter"></div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-rose">✦</span>
      <div class="divider-line"></div>
    </div>

    <p class="section-label">то, что я хотел сказать</p>
    <ul class="compliment-list" id="compList"></ul>

    <button class="restart-btn" onclick="restart()">Сыграть снова</button>
  </div>
</div>

<script>
const SYMBOLS = [
  {
    icon: '🌹', label: 'РОЗЫ',
    title: 'Твои глаза',
    comp: 'Твои глаза — когда ты смотришь, кажется, что время останавливается. Я каждый раз теряюсь, и до сих пор не привык к этому.'
  },
  {
    icon: '✨', label: 'СВЕТ',
    title: 'Твоя улыбка',
    comp: 'Твоя улыбка — это несправедливо, если честно. Становится теплее, и всё вокруг как будто меняется. Не знаю как ты это делаешь.'
  },
  {
    icon: '🕊️', label: 'НЕЖНОСТЬ',
    title: 'Как ты двигаешься',
    comp: 'Ты двигаешься так легко — даже самые обычные вещи в твоём исполнении выглядят красиво. Будто ты из другого мира.'
  },
  {
    icon: '🌙', label: 'НОЧЬ',
    title: 'Твой смех',
    comp: 'Когда ты смеёшься по-настоящему — я готов говорить что угодно, лишь бы снова это услышать. Серьёзно, это лучший звук.'
  },
  {
    icon: '💌', label: 'ПИСЬМО',
    title: 'Время с тобой',
    comp: 'Каждый раз когда мы вместе — я смотрю на часы и не понимаю куда делось время. С тобой его просто не существует.'
  },
  {
    icon: '🌸', label: 'ЦВЕТОК',
    title: 'Твой характер',
    comp: 'Ты живая и настоящая. Не притворяешься, не играешь. Это редкость, и именно это в тебе притягивает сильнее всего.'
  },
  {
    icon: '⭐', label: 'ЗВЕЗДА',
    title: 'Когда тебя нет',
    comp: 'Даже когда мы не видимся — ты всё равно здесь. Какая-то мелочь — и я сразу думаю о тебе. Это уже привычка.'
  },
  {
    icon: '🫀', label: 'СЕРДЦЕ',
    title: 'Рядом с тобой',
    comp: 'С тобой мне спокойно. Не нужно ничего изображать. Просто быть рядом — и этого уже достаточно. Это много значит.'
  }
];

const LETTER = `Зарин...

Я не умею красиво говорить, но попробую.

Каждый раз когда мы рядом — я чувствую что-то тёплое и спокойное. Не нужно никуда торопиться, не нужно ничего доказывать. Просто — быть.

Твои глаза, твой смех, то как ты говоришь — всё это как-то попало сюда и осталось.

Я просто хотел, чтобы ты знала: мне с тобой очень хорошо.

from ramz1k to JK ❤️`;

let cards = [];
let flipped = [];
let matched = 0;
let moves = 0;
let lock = false;
let pendingComp = null;
let musicPlaying = false;
const audio = document.getElementById('bgMusic');

function toggleMusic() {
  if (musicPlaying) {
    audio.pause();
    musicPlaying = false;
    document.getElementById('musicBtn').textContent = '🎵';
    document.getElementById('musicBtn').classList.remove('playing');
  } else {
    audio.play().then(() => {
      musicPlaying = true;
      document.getElementById('musicBtn').textContent = '🔊';
      document.getElementById('musicBtn').classList.add('playing');
    }).catch(() => {
      alert('Не удалось загрузить music.mp3. Убедись, что файл находится в той же папке, что и этот HTML.');
    });
  }
}

// Auto-play on first user interaction
document.addEventListener('click', function startMusic() {
  if (!musicPlaying) {
    audio.play().then(() => {
      musicPlaying = true;
      document.getElementById('musicBtn').textContent = '🔊';
      document.getElementById('musicBtn').classList.add('playing');
    }).catch(() => {});
  }
  document.removeEventListener('click', startMusic);
}, { once: true });

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards = []; flipped = []; matched = 0; moves = 0; lock = false; pendingComp = null;
  document.getElementById('moves').textContent = '0';
  document.getElementById('found').textContent = '0';

  const deck = shuffle([...SYMBOLS, ...SYMBOLS].map((s, i) => ({ ...s, uid: i })));

  deck.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.symbol = item.icon;
    card.dataset.comp = item.comp;
    card.dataset.title = item.title;
    card.dataset.icon = item.icon;
    card.dataset.idx = idx;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">
          <span>${item.icon}</span>
          <span class="label">${item.label}</span>
        </div>
      </div>`;
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
    cards.push(card);
  });
}

function flipCard(card) {
  if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    lock = true;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.dataset.symbol === b.dataset.symbol) {
    a.classList.add('matched');
    b.classList.add('matched');
    matched++;
    document.getElementById('found').textContent = matched;
    flipped = [];
    pendingComp = { comp: a.dataset.comp, title: a.dataset.title, icon: a.dataset.icon, num: matched, isLast: matched === 8 };
    setTimeout(() => showComp(pendingComp), 400);
  } else {
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      flipped = [];
      lock = false;
    }, 800);
  }
}

function showComp({ comp, title, icon, num, isLast }) {
  document.getElementById('compIcon').textContent = icon;
  document.getElementById('compNumber').textContent = num + ' из 8';
  document.getElementById('compTitle').textContent = title;
  document.getElementById('compText').innerHTML = comp;
  document.getElementById('compModal').classList.add('show');
  pendingComp = { isLast };
}

function closeComp() {
  document.getElementById('compModal').classList.remove('show');
  const isLast = pendingComp && pendingComp.isLast;
  pendingComp = null;
  lock = false;
  if (isLast) setTimeout(showWin, 350);
}

function showWin() {
  document.getElementById('winLetter').textContent = LETTER;
  const list = document.getElementById('compList');
  list.innerHTML = '';
  SYMBOLS.forEach(s => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="li-icon">${s.icon}</span><div class="li-body"><div class="li-title">${s.title}</div><div class="li-text">${s.comp}</div></div>`;
    list.appendChild(li);
  });
  document.getElementById('winOverlay').classList.add('show');
}

function restart() {
  document.getElementById('winOverlay').classList.remove('show');
  buildGrid();
}

buildGrid();
</script>
